<title>PNW 公路旅行 · 7.14–7.22</title>
<style>

  html,body{margin:0;height:100%}
  body{

  }
  header{background:linear-gradient(115deg,var(--evergreen),var(--ocean));color:#fff;padding:18px 22px}
  header .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
  header h1{margin:4px 0 2px;font-size:23px;font-weight:700}
  header .sub{font-size:13.5px;opacity:.92}
  .strip{display:flex;gap:8px;overflow-x:auto;padding:12px 22px 14px;background:var(--panel);border-bottom:1px solid var(--line);scrollbar-width:thin}
  .strip::-webkit-scrollbar{height:6px}
  .strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:12px;padding:8px 13px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-width:74px;transition:.15s;font:inherit;text-align:left}

  .tab .d{font-weight:700;font-size:14px;line-height:1}
  .tab .w{font-size:11px;color:var(--muted)}
  .tab.active{background:var(--evergreen);border-color:var(--evergreen);color:#fff}
  .tab.active .w{color:rgba(255,255,255,.85)}

  main{flex:1;display:grid;grid-template-columns:1.55fr 1fr;gap:16px;padding:16px 22px 22px;min-height:0}
  .mapwrap{position:relative;background:var(--panel);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);display:flex;flex-direction:column;min-height:460px}

  .legend{display:flex;gap:12px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  /* overlay for key help */
  .overlay{position:absolute;inset:0;background:var(--panel);display:flex;align-items:center;justify-content:center;padding:26px;z-index:5;overflow:auto}
  .overlay .box{max-width:460px}
  .overlay h3{margin:0 0 8px;font-size:17px}
  .overlay p{font-size:13.5px;color:var(--muted);line-height:1.6;margin:8px 0}
  .overlay ol{font-size:13.5px;line-height:1.7;padding-left:20px;margin:10px 0}
  .overlay li{margin-bottom:7px}
  .overlay a{color:var(--ocean)}
  .overlay code{background:var(--chip);padding:2px 6px;border-radius:5px;font-size:12.5px;word-break:break-all}
  .overlay .tip{font-size:12.5px;background:var(--chip);border-radius:9px;padding:9px 11px}
  .hidden{display:none!important}

  .panel .route{color:var(--evergreen);font-weight:700;font-size:14px;margin-bottom:8px}
  .panel .note{background:var(--chip);border-radius:11px;padding:10px 12px;font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:16px}
  .sec{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:16px 0 9px;font-weight:700}

  .card .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{display:inline-block;background:var(--chip);color:var(--muted);font-size:11px;padding:2px 7px;border-radius:6px;margin:5px 5px 0 0;font-weight:600}

  {q:"Seattle-Tacoma International Airport", name:"Sea-Tac 机场 · 出发", kind:"start"},
  {q:"Crystal Mountain, WA", name:"7.14 宿 · 水晶山", kind:"hotel"},

];

/* ---- 通用工具 ---- */
const enc = encodeURIComponent;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const COLOR = {sight:'#1f7a5c', suggest:'#2a7fb8', stop:'#6b7a75', hotel:'#e8825a', start:'#8a938f'};
function dirLink(qs){ return 'https://www.google.com/maps/dir/' + qs.map(enc).join('/'); }
function placeLink(q){ return 'https://www.google.com/maps/search/?api=1&query=' + enc(q); }
function dayQs(d){ return [d.from.q, ...d.stops.filter(s=>s.route!==false).map(s=>s.q), d.to.q]; }

/* 生成一天/总览的「点位 + 标记元数据」 */
function pointsFor(id){
  if(id==='ov'){
    const M={start:{c:COLOR.start,l:'起',k:'start'}, end:{c:COLOR.start,l:'返',k:'start'},
             hotel:{c:COLOR.hotel,l:'宿',k:'hotel'}, via:{c:COLOR.sight,l:'途',k:'sight'}};
    return OVERVIEW.map(o=>({ q:o.q, title:o.name, color:M[o.kind].c, label:M[o.kind].l, kind:M[o.kind].k }));
  }
  const d = DAYS.find(x=>x.id===id);
  const arr = [{q:d.from.q, title:d.from.name, color:COLOR.start, label:'起', kind:'start'}];
  d.stops.forEach((s,i)=>arr.push({
    q:s.q, title:s.name, color:COLOR[s.tag]||COLOR.sight,
    label:String(i+1), kind:'sight', badge:s.badge, suggest:s.tag==='suggest',
    route:s.route!==false
  }));
  arr.push({q:d.to.q, title:d.to.name, color:COLOR.hotel, label:'宿', kind:'hotel', hotel:d.hotel});
  return arr;
}

const strip=document.getElementById('strip'), panel=document.getElementById('panel'),

function buildTabs(){
  const ov=document.createElement('button');
  ov.className='tab ov'; ov.dataset.id='ov';
  ov.innerHTML=`<span class="d">总览</span><span class="w">全程</span>`;
  ov.onclick=()=>select('ov'); strip.appendChild(ov);
  DAYS.forEach(d=>{
    const b=document.createElement('button'); b.className='tab'; b.dataset.id=d.id;
    b.innerHTML=`<span class="d">${d.date}</span><span class="w">${d.wd}</span>`;
    b.onclick=()=>select(d.id); strip.appendChild(b);
  });
}
function stopCard(s,i){
  const cls=s.tag==='suggest'?'suggest':s.tag==='stop'?'stop':'';
  const badge=s.badge?`<div class="badge">${s.badge}</div>`:'';
  const tag=s.tag==='suggest'?'<div class="meta">推荐 · 可选</div>':'';
  return `<a class="card ${cls}" href="${esc(placeLink(s.q))}" target="_blank" rel="noopener">
    <span class="num">${i}</span>
    <span class="body"><div class="nm">${s.name}</div>${tag}${badge}</span>
    <span class="go">地图 ↗</span></a>`;
}

  if(!h) return `<div class="card" style="opacity:.75"><span class="ico">🧳</span>
    <span class="body"><div class="nm">返程日 · 无住宿</div><div class="meta">当天从 DuPont 酒店出发,结束行程</div></span></div>`;
  const bf=h.bf?'<span class="badge">🥐 含早餐</span>':'';
  const extra=h.extra?`<span class="badge">${h.extra}</span>`:'';
  return `<div class="card hotel"><span class="ico">🏨</span>
    <span class="body"><div class="nm">${h.name}</div><div class="meta">${h.sub||''}</div>
      <div>${bf}${extra}</div>
      <div class="hlinks">
        <a href="${esc(placeLink(h.q))}" target="_blank" rel="noopener" style="color:var(--muted)">📍 地图</a>
        ${h.url?`<a href="${esc(h.url)}" target="_blank" rel="noopener" style="color:var(--ocean)">🔗 Expedia 预订</a>`:''}
      </div></span></div>`;
}
function renderDayPanel(d){
  panel.innerHTML=`
    <div class="route">${d.date} ${d.wd}</div>
    <h2>${d.from.name} → ${d.to.name}</h2>
    <div class="note">${d.note}</div>
    <div class="sec">📍 沿途打卡点(${d.stops.length})</div>
    ${d.stops.map((s,i)=>stopCard(s,i+1)).join('')}
    <div class="sec">🏨 今晚住宿</div>
    ${hotelCard(d.hotel)}`;
}
function renderOverviewPanel(){
  const list=DAYS.map(d=>`
    <div class="ovday" data-id="${d.id}">
      <div class="dd"><b>${d.date}</b><span>${d.wd}</span></div>
      <div class="oc"><div class="r">${d.title}</div>
        <div class="s">🏨 ${d.hotel?d.hotel.name:'返程 · Sea-Tac'}</div></div>
      <span class="go" style="color:var(--muted)">›</span></div>`).join('');
  panel.innerHTML=`
    <h2>全程总览 · 9 天 8 晚</h2>
    <div class="route">Seattle ↺ Oregon Coast Loop</div>
    <div class="note">每天从上一晚酒店出发,沿途打卡,晚上到下一家酒店。点任意一天查看当天路线、景点与住宿。</div>
    ${list}`;
  panel.querySelectorAll('.ovday').forEach(el=>el.onclick=()=>select(Number(el.dataset.id)));
}

function select(id){
  currentSel=id;
  strip.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id==String(id)));
  if(id==='ov'){ renderOverviewPanel(); openA.href=dirLink(OVERVIEW.map(o=>o.q)); }
  else { const d=DAYS.find(x=>x.id===id); renderDayPanel(d); openA.href=dirLink(dayQs(d)); }
  panel.scrollTop=0;
  updateMap(id);
}

/* ======================= Google 地图 ======================= */
let mapsReady=false, gmap, gDir, gGeo, gInfo, gRenderers=[], gMarkers=[];
const geoCache={};

function onMapsReady(){
  gmap=new google.maps.Map(document.getElementById('map'),{
    center:{lat:45.4,lng:-122.6}, zoom:6,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:true, gestureHandling:'greedy'
  });
  gDir=new google.maps.DirectionsService();
  gGeo=new google.maps.Geocoder();
  gInfo=new google.maps.InfoWindow();
  mapsReady=true;
  overlay.classList.add('hidden');
  updateMap(currentSel);
}
window.onMapsReady=onMapsReady;
window.gm_authFailure=()=>showOverlay('auth');

function geocode(q){
  if(geoCache[q]) return Promise.resolve(geoCache[q]);
  return new Promise(res=>{
    gGeo.geocode({address:q, region:'us'},(r,st)=>{
      if(st==='OK'&&r[0]){ geoCache[q]=r[0].geometry.location; res(r[0].geometry.location); }
      else res(null);
    });
  });
}
function clearMap(){
  gMarkers.forEach(m=>m.setMap(null)); gMarkers=[];
  gRenderers.forEach(r=>r.setMap(null)); gRenderers=[];
  if(gInfo) gInfo.close();
}
function infoHtml(m){
  let extra='';
  if(m.kind==='hotel'&&m.hotel) extra+=`<div style="font-size:12px;color:#777;margin-top:3px">🏨 今晚住宿${m.hotel.bf?' · 含早餐':''}</div>`;
  if(m.badge) extra+=`<div style="font-size:12px;color:#777;margin-top:3px">${m.badge}</div>`;
  if(m.suggest) extra+=`<div style="font-size:12px;color:#2a7fb8;margin-top:3px">推荐 · 可选</div>`;
  return `<div style="font:13px/1.5 -apple-system,sans-serif;max-width:190px;color:#222">
    <b>${esc(m.title)}</b>${extra}
    <div style="margin-top:6px"><a href="${esc(placeLink(m.q))}" target="_blank" style="color:#2a7fb8;text-decoration:none">在 Google 地图打开 ↗</a></div></div>`;
}
async function updateMap(id){
  if(!mapsReady) return;
  clearMap();
  const meta=pointsFor(id);
  const coords=await Promise.all(meta.map(m=>geocode(m.q)));
  if(currentSel!==id) return; // 期间又切换了,放弃这次
  const bounds=new google.maps.LatLngBounds();
  meta.forEach((m,i)=>{
    const pos=coords[i]; if(!pos) return;
    bounds.extend(pos);
    const big=(m.kind!=='sight');
    const mk=new google.maps.Marker({
      position:pos, map:gmap, title:m.title,
      zIndex: m.kind==='hotel'?4:m.kind==='start'?2:3,
      icon:{path:google.maps.SymbolPath.CIRCLE, scale:big?13:11,
        fillColor:m.color, fillOpacity:1, strokeColor:'#ffffff', strokeWeight:2.5},
      label:{text:m.label, color:'#ffffff', fontSize:m.label.length>1?'11px':'12px', fontWeight:'700'}
    });
    mk.addListener('click',()=>{ gInfo.setContent(infoHtml(m)); gInfo.open({anchor:mk, map:gmap}); });
    gMarkers.push(mk);
  });
  if(!bounds.isEmpty()) gmap.fitBounds(bounds, 64);
  // 路线:每天单独连线;总览 = 把每天的路线叠加(因此和每天完全一致)
  const drawRoute=(qs,onDone)=>{
    if(qs.length<2) return;
    const renderer=new google.maps.DirectionsRenderer({map:gmap, suppressMarkers:true, preserveViewport:true,
      polylineOptions:{strokeColor:'#2a7fb8', strokeOpacity:.85, strokeWeight:5}});
    gRenderers.push(renderer);
    const req={origin:qs[0], destination:qs[qs.length-1],
      waypoints:qs.slice(1,-1).map(q=>({location:q, stopover:true})), travelMode:google.maps.TravelMode.DRIVING};
    const run=(n)=>gDir.route(req,(res,st)=>{
      if(!gRenderers.includes(renderer)) return;
      if(st==='OK'){ renderer.setDirections(res); if(onDone) onDone(res); }
      else if(st==='OVER_QUERY_LIMIT' && n<4){ setTimeout(()=>run(n+1), 400*n); }
    });
    run(1);
  };
  if(id==='ov'){
    const ovb=new google.maps.LatLngBounds();
    DAYS.forEach((d,i)=>setTimeout(()=>{
      if(currentSel!=='ov') return;
      drawRoute(dayQs(d),(res)=>{ if(currentSel==='ov'){ ovb.union(res.routes[0].bounds); gmap.fitBounds(ovb,40); } });
    }, i*280));
  } else {
    drawRoute(meta.filter(m=>m.route!==false).map(m=>m.q));
  }
}

/* ======================= 加载脚本 / 提示 ======================= */
function showOverlay(kind){
  let html;
  if(kind==='auth') html=`<div class="box"><h3>⚠️ API Key 无效或未授权</h3>
    <p>请确认这个 key 已经启用了 <b>Maps JavaScript API</b>、<b>Directions API</b>、<b>Geocoding API</b> 三个服务,且 key 填写正确。改好后刷新页面。</p></div>`;
  else if(kind==='load') html=`<div class="box"><h3>⚠️ 地图脚本加载失败</h3>
    <p>请检查网络连接,以及顶部的 <code>GOOGLE_MAPS_API_KEY</code> 是否填写正确,然后刷新页面。</p></div>`;
  else html=`<div class="box">
    <h3>🔑 需要一个免费的 Google Maps API Key</h3>
    <p>地图标记功能要用 Google 的 Maps API。拿 key 约 2–3 分钟,个人本地使用在免费额度内基本不花钱:</p>
    <ol>
      <li>打开 <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">Google Cloud Console</a> 登录</li>
      <li>顶部新建一个项目(或选已有的)</li>
      <li>「API 和服务」→「库」,搜索并<b>启用</b>这三个:<b>Maps JavaScript API</b>、<b>Directions API</b>、<b>Geocoding API</b></li>
      <li>「API 和服务」→「凭据」→「创建凭据」→「API 密钥」,复制生成的 key</li>
      <li>用编辑器打开本文件,把顶部这行的引号填上 key:<br><code>const GOOGLE_MAPS_API_KEY = "把key填这里";</code><br>保存后刷新页面即可</li>
    </ol>
    <p class="tip">🔒 安全建议:在 key 的「API 限制」里只勾选上面三个 API。本地文件用「网站来源」限制不方便,先用 API 限制即可。</p></div>`;
  overlay.innerHTML=html; overlay.classList.remove('hidden');
}
function loadMaps(){
  if(!GOOGLE_MAPS_API_KEY){ showOverlay('need'); return; }
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${enc(GOOGLE_MAPS_API_KEY)}&callback=onMapsReady&language=zh-CN&region=US`;
  s.async=true; s.defer=true; s.onerror=()=>showOverlay('load');
  document.head.appendChild(s);
}

/* ======================= 启动 ======================= */
buildTabs();
select('ov');
document.getElementById('foot').textContent='绿色=打卡点,蓝色=可选,橙色=当晚住宿,灰色=出发点 · 点标记看名字和链接';
loadMaps();
</script>
